<!-- DELIVERY BOOKING MODAL -->
<div id="booking-modal-delivery" class="modal booking-modal">
  <div class="modal-content booking-modal-content">
    <span class="modal-close-btn" onclick="closeBookingModal('delivery')"
      >&times;</span
    >
    <h2 class="booking-modal-title">📦 Đặt đơn giao hàng</h2>
    <p class="booking-modal-subtitle">
      Dành cho giao chậm, tiêu chuẩn, giao nhanh và hỏa tốc.
    </p>

    <form
      id="create-order-form"
      class="booking-order-form"
      data-form-type="delivery"
    >
      <div class="form-section">
        <h3>1. Chọn gói giao hàng</h3>
        <div class="form-grid">
          <div class="grid-span-full">
            <select name="service_type" id="order-service-type" required>
              <option value="">-- Vui lòng chọn gói --</option>
              <option value="slow">Giao chậm</option>
              <option value="standard">Giao tiêu chuẩn</option>
              <option value="fast">Giao nhanh</option>
              <option value="express">Giao hỏa tốc</option>
              <option value="intl_economy">Tiêu chuẩn quốc tế</option>
              <option value="intl_express">Chuyển phát nhanh quốc tế</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3>2. Thông tin người gửi</h3>
        <div class="form-grid">
          <div>
            <label>Họ và tên *</label>
            <input
              type="text"
              name="name"
              placeholder="Nhập họ và tên"
              required
            />
          </div>
          <div>
            <label>Số điện thoại *</label>
            <input
              type="tel"
              name="phone"
              placeholder="0987654321"
              pattern="0[0-9]{9,10}"
              required
            />
          </div>
          <div class="grid-span-full">
            <label>Địa chỉ lấy hàng *</label>
            <input
              type="text"
              id="pickup-addr"
              name="pickup"
              list="booking-address-suggestions"
              autocomplete="street-address"
              placeholder="Số nhà, tên đường, phường, quận..."
              required
            />
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3>3. Thông tin người nhận</h3>
        <div class="form-grid">
          <div>
            <label>Tên người nhận *</label>
            <input
              type="text"
              name="receiver_name"
              placeholder="Nhập tên người nhận"
              required
            />
          </div>
          <div>
            <label>Số điện thoại *</label>
            <input
              type="tel"
              name="receiver_phone"
              placeholder="0987654321"
              pattern="0[0-9]{9,10}"
              required
            />
          </div>
          <div class="grid-span-full">
            <label>Địa chỉ giao hàng *</label>
            <input
              type="text"
              id="delivery-addr"
              name="delivery"
              list="booking-address-suggestions"
              autocomplete="street-address"
              placeholder="Số nhà, tên đường, phường, quận..."
              required
            />
          </div>
          <div id="delivery-intl-country-group" class="is-hidden">
            <label>Quốc gia nhận *</label>
            <select id="delivery-intl-country" name="intl_country">
              <option value="">Chọn quốc gia nhận</option>
            </select>
          </div>
          <div id="delivery-intl-province-group" class="is-hidden">
            <label>Tỉnh/Thành phố nhận (quốc tế)</label>
            <select id="delivery-intl-province" name="intl_province" disabled>
              <option value="">Chọn tỉnh/thành phố nhận</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3>4. Thông tin hàng hóa</h3>
        <div class="form-grid">
          <div>
            <label>Loại hàng hóa *</label>
            <select name="package_type" required>
              <option value="">-- Chọn loại hàng --</option>
              <option value="document">Tài liệu/Giấy tờ</option>
              <option value="food">Thực phẩm</option>
              <option value="clothes">Quần áo</option>
              <option value="electronic">Đồ điện tử</option>
              <option value="other">Khác</option>
            </select>
          </div>
          <div>
            <label>Khối lượng (kg) *</label>
            <input
              type="number"
              id="weight"
              name="weight"
              value="1"
              min="0"
              step="0.5"
              required
            />
          </div>
          <div id="cod-field-group">
            <label>Tiền thu hộ (COD)</label>
            <input
              type="number"
              id="cod_amount"
              name="cod_amount"
              value="0"
              min="0"
            />
          </div>
          <div class="grid-span-full">
            <label>Ghi chú cho tài xế</label>
            <textarea
              name="note"
              placeholder="VD: Hàng dễ vỡ, gọi trước khi giao..."
            ></textarea>
          </div>

          <!-- Hidden Dimensions -->
          <div class="grid-span-full">
            <a
              href="#"
              id="toggle-delivery-dimensions"
              class="dimensions-toggle-link"
              >+ Nhập kích thước (Nếu hàng cồng kềnh)</a
            >
            <div
              id="modal-dimensions-group"
              class="form-grid dimensions-grid is-hidden"
            >
              <div>
                <label>Dài (cm)</label>
                <input
                  type="number"
                  name="length"
                  min="1"
                  step="1"
                  placeholder="30"
                />
              </div>
              <div>
                <label>Rộng (cm)</label>
                <input
                  type="number"
                  name="width"
                  min="1"
                  step="1"
                  placeholder="20"
                />
              </div>
              <div>
                <label>Cao (cm)</label>
                <input
                  type="number"
                  name="height"
                  min="1"
                  step="1"
                  placeholder="15"
                />
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="form-section">
        <h3>5. Thanh toán & Hóa đơn</h3>
        <div class="form-grid">
          <div>
            <label>Phương thức thanh toán</label>
            <select id="payment_method_delivery" name="payment_method">
              <option value="cod">Thanh toán khi lấy hàng</option>
              <option value="bank_transfer">Chuyển khoản ngân hàng</option>
            </select>
          </div>
          <div class="checkbox-stack checkbox-center">
            <label class="checkbox-inline">
              <input
                type="checkbox"
                name="is_corporate"
                id="is_corporate_checkbox_delivery"
              />
              Yêu cầu hóa đơn công ty
            </label>
          </div>
          <div
            id="corporate-fields-delivery"
            class="grid-span-full corporate-fields is-hidden"
          >
            <div class="form-grid">
              <div class="grid-span-full">
                <label>Tên công ty *</label>
                <input
                  type="text"
                  name="company_name"
                  placeholder="Nhập tên công ty"
                />
              </div>
              <div>
                <label>Email công ty *</label>
                <input
                  type="email"
                  name="company_email"
                  placeholder="Email nhận hóa đơn"
                />
              </div>
              <div>
                <label>Mã số thuế *</label>
                <input
                  type="text"
                  name="company_tax_code"
                  placeholder="Nhập mã số thuế"
                />
              </div>
              <div class="grid-span-full">
                <label>Địa chỉ công ty *</label>
                <textarea
                  name="company_address"
                  placeholder="Nhập địa chỉ công ty"
                ></textarea>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="price-preview" class="price-preview is-hidden">
        Phí vận chuyển dự kiến: <strong id="shipping-fee-display">0</strong>đ
        <input
          type="hidden"
          name="shipping_fee"
          id="shipping-fee-input"
          value="0"
        />
      </div>

      <div class="modal-actions">
        <button
          type="button"
          onclick="closeBookingModal('delivery')"
          class="btn-secondary"
        >
          Hủy
        </button>
        <button type="submit" class="btn-primary">Đặt lịch</button>
      </div>
    </form>
  </div>
</div>
